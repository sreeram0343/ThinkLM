<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThinkLM Dashboard • Self-Evolving Language Model</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    function App() {
      const [activeTab, setActiveTab] = useState('scheduler'); // 'scheduler', 'playground', 'hub', 'telemetry'

      // --- VIEW 1 STATES: Scheduler ---
      const [currentStep, setCurrentStep] = useState(55);
      const [kSteps, setKSteps] = useState(50);
      const [learningRate, setLearningRate] = useState('1e-6');
      const [klBeta, setKlBeta] = useState(0.001);

      const isPhase1 = useMemo(() => (currentStep % (2 * kSteps)) < kSteps, [currentStep, kSteps]);
      const activePhaseName = isPhase1 ? 'PHASE 1: Policy Training' : 'PHASE 2: Rubric Training';
      const activeRoleName = isPhase1 ? 'Policy (Response Generator)' : 'Rubric Generator';
      const activeSystemPrompt = isPhase1 
        ? 'You are a helpful assistant.'
        : 'You are an expert evaluator generating rubrics to assess answers to questions.';

      // --- VIEW 2 STATES: Rubric & Judge Playground ---
      const [queryInput, setQueryInput] = useState(
        'The perimeter of a rectangle is 48. What is the largest possible area of the rectangle?'
      );

      const [criteriaList, setCriteriaList] = useState([
        {
          id: 1,
          criterion: 'Provides the correct maximum area of 144, derived from the given perimeter of 48.',
          weight: 0.80,
          scoring_levels: {
            '1.0': 'States 144 clearly and derives it from perimeter 48.',
            '0.5': 'States 144 but misses derivation steps.',
            '0.0': 'Incorrect maximum area or fails to solve.'
          },
          isDealbreaker: true
        },
        {
          id: 2,
          criterion: 'Uses perimeter formula 2(L+W)=48 and area formula A=L*W correctly.',
          weight: 0.15,
          scoring_levels: {
            '1.0': 'Correctly sets up 2(L+W)=48 and Area=L*(24-L).',
            '0.0': 'Contains major formula errors.'
          },
          isDealbreaker: false
        },
        {
          id: 3,
          criterion: 'Explains that a square maximizes area for a given perimeter.',
          weight: 0.05,
          scoring_levels: {
            '1.0': 'Explicitly notes L=W=12 forms a square.',
            '0.0': 'No explanation provided.'
          },
          isDealbreaker: false
        }
      ]);

      const [expandedCriteria, setExpandedCriteria] = useState({ 1: true });
      const [responseToEvaluate, setResponseToEvaluate] = useState(
        'Let length be L and width be W. Given perimeter 2(L+W)=48 => L+W=24. Area A = L*W = L*(24-L). Taking derivative dA/dL = 24 - 2L = 0 yields L=12 and W=12. Since L=W=12, the rectangle is a square. The maximum area is 144.'
      );

      const [satisfactionScores, setSatisfactionScores] = useState({ 1: 1.0, 2: 1.0, 3: 0.9 });
      const [isJudging, setIsJudging] = useState(false);

      const totalWeight = useMemo(() => criteriaList.reduce((acc, c) => acc + c.weight, 0), [criteriaList]);
      const isWeightValid = totalWeight >= 0.85 && totalWeight <= 1.15;

      const totalJudgeScore = useMemo(() => {
        return criteriaList.reduce((acc, c) => acc + (c.weight * (satisfactionScores[c.id] || 0)), 0);
      }, [criteriaList, satisfactionScores]);

      const handlePresetSelect = (type) => {
        if (type === 'math') {
          setQueryInput('The perimeter of a rectangle is 48. What is the largest possible area of the rectangle?');
          setCriteriaList([
            {
              id: 1,
              criterion: 'Provides the correct maximum area of 144, derived from perimeter 48.',
              weight: 0.80,
              scoring_levels: {
                '1.0': 'States 144 as the maximum area.',
                '0.0': 'Incorrect area calculation.'
              },
              isDealbreaker: true
            },
            {
              id: 2,
              criterion: 'Uses formulas 2(L+W)=48 and A=L*W accurately.',
              weight: 0.20,
              scoring_levels: {
                '1.0': 'Correct algebraic setup.',
                '0.0': 'Formula error.'
              },
              isDealbreaker: false
            }
          ]);
        } else if (type === 'summary') {
          setQueryInput('Create a 3-paragraph summary of AI impact in software development. Each paragraph must start with a square-bracket title.');
          setCriteriaList([
            {
              id: 1,
              criterion: 'Consists of exactly 3 paragraphs, each starting with a bracketed title.',
              weight: 0.50,
              scoring_levels: {
                '1.0': 'Exactly 3 paragraphs with bracketed titles.',
                '0.5': '3 paragraphs but missing titles.',
                '0.0': 'Incorrect paragraph count.'
              },
              isDealbreaker: false
            },
            {
              id: 2,
              criterion: 'Discusses developer productivity, code quality, and future concerns.',
              weight: 0.50,
              scoring_levels: {
                '1.0': 'Covers productivity, quality, and future outlook thoroughly.',
                '0.0': 'Off-topic content.'
              },
              isDealbreaker: false
            }
          ]);
        }
      };

      // --- VIEW 3 STATES: Preference Hub ---
      const [hubTab, setHubTab] = useState('temporal');

      const rolloutBuffer = [
        { step: 120, question: 'Perimeter of 48 max area', response: 'L=12, W=12 => Area 144', ageGap: 0 },
        { step: 110, question: 'Perimeter of 48 max area', response: 'L=14, W=10 => Area 140', ageGap: 10 },
        { step: 80, question: 'Perimeter of 48 max area', response: 'L=16, W=8 => Area 128', ageGap: 40 },
        { step: 40, question: 'Perimeter of 48 max area', response: 'Area = 48 * 2 = 96', ageGap: 80 },
        { step: 20, question: 'Perimeter of 48 max area', response: 'Perimeter is 48.', ageGap: 100 },
      ];

      // --- VIEW 4 SVG inline charts data ---
      const marginCurve = [0.05, 0.12, 0.18, 0.25, 0.32, 0.38, 0.42];
      const accuracyCurve = [59.7, 61.2, 63.5, 65.8, 67.4, 68.9, 69.3];
      const formatErrorCurve = [77.0, 45.0, 23.0, 12.0, 3.5, 1.2, 0.8];

      const renderSvgLine = (data, min, max, color) => {
        const width = 300;
        const height = 80;
        const points = data.map((val, idx) => {
          const x = (idx / (data.length - 1)) * width;
          const y = height - ((val - min) / (max - min)) * (height - 15) - 8;
          return `${x},${y}`;
        }).join(' ');

        return (
          <svg width="100%" height="80" viewBox={`0 0 ${width} ${height}`} className="overflow-visible">
            <polyline fill="none" stroke={color} strokeWidth="3" points={points} strokeLinecap="round" />
            {data.map((val, idx) => {
              const x = (idx / (data.length - 1)) * width;
              const y = height - ((val - min) / (max - min)) * (height - 15) - 8;
              return <circle key={idx} cx={x} cy={y} r="4" fill={color} className="transition-all hover:r-6" />;
            })}
          </svg>
        );
      };

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 font-sans p-6">
          {/* Top Header */}
          <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 pb-6 mb-8 border-b border-slate-800">
            <div>
              <div className="flex items-center gap-3">
                <div className="p-2 rounded-xl bg-indigo-600/20 border border-indigo-500/30 text-indigo-400">
                  <i data-lucide="cpu" className="w-7 h-7"></i>
                </div>
                <div>
                  <h1 className="text-2xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-300 via-slate-100 to-emerald-300">
                    ThinkLM Control Dashboard
                  </h1>
                  <p className="text-xs text-slate-400">
                    Self-Evolving Language Model • Co-Evolved Discriminative Rubrics Architecture (EvoLM)
                  </p>
                </div>
              </div>
            </div>

            {/* View Switcher Tabs */}
            <div className="flex items-center gap-2 p-1.5 rounded-xl bg-slate-900 border border-slate-800">
              <button
                onClick={() => setActiveTab('scheduler')}
                className={`flex items-center gap-2 px-4 py-2 text-xs font-semibold rounded-lg transition-all ${
                  activeTab === 'scheduler' 
                    ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' 
                    : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'
                }`}
              >
                <i data-lucide="layers" className="w-4 h-4"></i>
                Phase Scheduler
              </button>

              <button
                onClick={() => setActiveTab('playground')}
                className={`flex items-center gap-2 px-4 py-2 text-xs font-semibold rounded-lg transition-all ${
                  activeTab === 'playground' 
                    ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' 
                    : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'
                }`}
              >
                <i data-lucide="zap" className="w-4 h-4"></i>
                Rubric & Judge Playground
              </button>

              <button
                onClick={() => setActiveTab('hub')}
                className={`flex items-center gap-2 px-4 py-2 text-xs font-semibold rounded-lg transition-all ${
                  activeTab === 'hub' 
                    ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' 
                    : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'
                }`}
              >
                <i data-lucide="git-compare" className="w-4 h-4"></i>
                Preference Hub
              </button>

              <button
                onClick={() => setActiveTab('telemetry')}
                className={`flex items-center gap-2 px-4 py-2 text-xs font-semibold rounded-lg transition-all ${
                  activeTab === 'telemetry' 
                    ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' 
                    : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'
                }`}
              >
                <i data-lucide="trending-up" className="w-4 h-4"></i>
                Telemetry
              </button>
            </div>
          </header>

          {/* CORE VIEW 1: Joint Training Phase Scheduler */}
          {activeTab === 'scheduler' && (
            <div className="space-y-6">
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="lg:col-span-2 p-6 rounded-2xl bg-slate-900/80 border border-slate-800 space-y-6">
                  <div className="flex items-center justify-between border-b border-slate-800/80 pb-4">
                    <div className="flex items-center gap-3">
                      <i data-lucide="sliders" className="w-5 h-5 text-indigo-400"></i>
                      <h2 className="text-base font-semibold text-slate-100">Co-Evolution Phase Controller (K={kSteps})</h2>
                    </div>
                    <span className={`px-3 py-1 text-xs font-bold rounded-full border ${
                      isPhase1 
                        ? 'bg-indigo-500/20 text-indigo-300 border-indigo-500/40' 
                        : 'bg-emerald-500/20 text-emerald-300 border-emerald-500/40'
                    }`}>
                      {activePhaseName}
                    </span>
                  </div>

                  <div className="space-y-3">
                    <div className="flex justify-between text-xs text-slate-400">
                      <span>Step 1 (Phase 1 Start)</span>
                      <span className="text-slate-200 font-bold text-sm">Current Step: {currentStep} / 100</span>
                      <span>Step 100 (Phase 2 End)</span>
                    </div>
                    <input
                      type="range"
                      min="1"
                      max="100"
                      value={currentStep}
                      onChange={(e) => setCurrentStep(parseInt(e.target.value))}
                      className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-indigo-500"
                    />
                  </div>

                  <div className="space-y-2">
                    <div className="text-xs font-medium text-slate-400">Alternating Phase Timeline (50-Step Blocks)</div>
                    <div className="grid grid-cols-2 gap-2 p-1.5 rounded-xl bg-slate-950 border border-slate-800">
                      <div className={`p-4 rounded-lg border text-center transition-all ${
                        isPhase1 
                          ? 'bg-indigo-950/60 border-indigo-500 text-indigo-200 shadow-md shadow-indigo-900/30' 
                          : 'bg-slate-900/40 border-slate-800/60 text-slate-500 opacity-60'
                      }`}>
                        <div className="text-xs font-bold uppercase tracking-wider mb-1">Phase 1: Policy Training</div>
                        <div className="text-xs">Steps 1 - 50 • Updating Policy (θ) • Frozen Rubric (φ)</div>
                      </div>

                      <div className={`p-4 rounded-lg border text-center transition-all ${
                        !isPhase1 
                          ? 'bg-emerald-950/60 border-emerald-500 text-emerald-200 shadow-md shadow-emerald-900/30' 
                          : 'bg-slate-900/40 border-slate-800/60 text-slate-500 opacity-60'
                      }`}>
                        <div className="text-xs font-bold uppercase tracking-wider mb-1">Phase 2: Rubric Training</div>
                        <div className="text-xs">Steps 51 - 100 • Updating Rubric (φ) • Frozen Policy (θ)</div>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4 pt-4 border-t border-slate-800/80">
                    <div>
                      <label className="text-xs text-slate-400 mb-1 block">K-Step Frequency</label>
                      <input
                        type="number"
                        value={kSteps}
                        onChange={(e) => setKSteps(parseInt(e.target.value) || 50)}
                        className="w-full px-3 py-2 text-xs rounded-lg bg-slate-950 border border-slate-800 text-slate-200 focus:outline-none focus:border-indigo-500"
                      />
                    </div>
                    <div>
                      <label className="text-xs text-slate-400 mb-1 block">Learning Rate (Constant)</label>
                      <input
                        type="text"
                        value={learningRate}
                        onChange={(e) => setLearningRate(e.target.value)}
                        className="w-full px-3 py-2 text-xs rounded-lg bg-slate-950 border border-slate-800 text-slate-200 focus:outline-none focus:border-indigo-500"
                      />
                    </div>
                    <div>
                      <label className="text-xs text-slate-400 mb-1 block">KL Coeff (β)</label>
                      <input
                        type="number"
                        step="0.0001"
                        value={klBeta}
                        onChange={(e) => setKlBeta(parseFloat(e.target.value))}
                        className="w-full px-3 py-2 text-xs rounded-lg bg-slate-950 border border-slate-800 text-slate-200 focus:outline-none focus:border-indigo-500"
                      />
                    </div>
                  </div>
                </div>

                <div className="p-6 rounded-2xl bg-slate-900/80 border border-slate-800 flex flex-col justify-between space-y-6">
                  <div>
                    <div className="flex items-center gap-3 mb-4 pb-3 border-b border-slate-800">
                      <i data-lucide="cpu" className="w-5 h-5 text-emerald-400"></i>
                      <h3 className="text-base font-semibold text-slate-100">Parameter Pool: Qwen3-8B</h3>
                    </div>
                    <div className="text-xs text-slate-400 mb-4">
                      Single-model parameter-sharing architecture. Dynamically switches active role via runtime system prompts.
                    </div>

                    <div className="p-4 rounded-xl bg-slate-950 border border-slate-800 space-y-3">
                      <div className="flex items-center justify-between text-xs">
                        <span className="text-slate-400">Active Role:</span>
                        <span className="font-semibold text-indigo-300">{activeRoleName}</span>
                      </div>
                      <div className="flex items-center justify-between text-xs">
                        <span className="text-slate-400">Gradient Status:</span>
                        <span className="font-semibold text-emerald-400">
                          {isPhase1 ? 'θ (Policy) trainable' : 'φ (Generator) trainable'}
                        </span>
                      </div>
                      <div className="pt-2 border-t border-slate-900">
                        <div className="text-[11px] text-slate-500 mb-1">Active System Prompt:</div>
                        <div className="p-2.5 rounded-lg bg-slate-900 text-xs font-mono text-slate-300 border border-slate-800">
                          "{activeSystemPrompt}"
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="p-3 rounded-xl bg-indigo-950/40 border border-indigo-900/50 text-xs text-indigo-300 flex items-center gap-2">
                    <i data-lucide="check-circle" className="w-4 h-4 text-indigo-400 flex-shrink-0"></i>
                    <span>Parameter-sharing configuration halves GPU memory footprint during RL post-training.</span>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* CORE VIEW 2: Interactive Rubric Generation & Judge Playground */}
          {activeTab === 'playground' && (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="p-6 rounded-2xl bg-slate-900/80 border border-slate-800 space-y-6">
                <div className="flex items-center justify-between pb-3 border-b border-slate-800">
                  <div className="flex items-center gap-3">
                    <i data-lucide="book-open" className="w-5 h-5 text-indigo-400"></i>
                    <h2 className="text-base font-semibold text-slate-100">Rubric Generator (EvoLM Schema)</h2>
                  </div>
                  <div className="flex gap-2">
                    <button
                      onClick={() => handlePresetSelect('math')}
                      className="px-2.5 py-1 text-[11px] rounded-md bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700"
                    >
                      Math Preset
                    </button>
                    <button
                      onClick={() => handlePresetSelect('summary')}
                      className="px-2.5 py-1 text-[11px] rounded-md bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700"
                    >
                      Summary Preset
                    </button>
                  </div>
                </div>

                <div className="space-y-2">
                  <label className="text-xs text-slate-300 font-medium">User Query / Question</label>
                  <textarea
                    value={queryInput}
                    onChange={(e) => setQueryInput(e.target.value)}
                    rows={3}
                    className="w-full p-3 text-xs rounded-xl bg-slate-950 border border-slate-800 text-slate-200 focus:outline-none focus:border-indigo-500"
                  />
                  <button
                    onClick={() => alert("Rubric re-generated successfully with Pydantic validation!")}
                    className="w-full py-2.5 px-4 text-xs font-semibold rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-600/30 flex items-center justify-center gap-2 transition-all"
                  >
                    <i data-lucide="zap" className="w-4 h-4"></i>
                    Generate Instance-Specific Rubric
                  </button>
                </div>

                <div className="space-y-4 pt-2">
                  <div className="flex items-center justify-between">
                    <span className="text-xs font-semibold text-slate-300">Generated Criteria ({criteriaList.length} Items)</span>
                    <span className={`text-xs px-2.5 py-0.5 rounded-full border ${
                      isWeightValid 
                        ? 'bg-emerald-500/20 text-emerald-300 border-emerald-500/30' 
                        : 'bg-rose-500/20 text-rose-300 border-rose-500/30'
                    }`}>
                      Weight Sum: {totalWeight.toFixed(2)} (Target: 1.0 ± 0.15)
                    </span>
                  </div>

                  {criteriaList.map((crit) => (
                    <div key={crit.id} className="p-4 rounded-xl bg-slate-950 border border-slate-800/80 space-y-3">
                      <div className="flex items-start justify-between gap-3">
                        <div className="space-y-1">
                          <div className="flex items-center gap-2">
                            <span className="text-xs font-bold text-indigo-400">Criterion #{crit.id}</span>
                            {crit.isDealbreaker && (
                              <span className="px-2 py-0.5 text-[10px] font-bold rounded-md bg-amber-500/20 text-amber-300 border border-amber-500/40 flex items-center gap-1">
                                <i data-lucide="flame" className="w-3 h-3 text-amber-400"></i>
                                DEALBREAKER (Weight ≥ 0.80)
                              </span>
                            )}
                          </div>
                          <p className="text-xs text-slate-200 font-medium">{crit.criterion}</p>
                        </div>

                        <div className="flex items-center gap-2 flex-shrink-0">
                          <span className="text-xs font-semibold text-slate-300 bg-slate-900 px-2 py-1 rounded-md border border-slate-800">
                            Weight: {crit.weight.toFixed(2)}
                          </span>
                        </div>
                      </div>

                      <div className="border-t border-slate-900 pt-2">
                        <button
                          onClick={() => setExpandedCriteria(prev => ({ ...prev, [crit.id]: !prev[crit.id] }))}
                          className="text-[11px] text-slate-400 hover:text-slate-200 flex items-center gap-1"
                        >
                          {expandedCriteria[crit.id] ? <i data-lucide="chevron-up" className="w-3.5 h-3.5"></i> : <i data-lucide="chevron-down" className="w-3.5 h-3.5"></i>}
                          {expandedCriteria[crit.id] ? 'Hide Scoring Levels' : 'View Scoring Levels (1.0, 0.5, 0.0)'}
                        </button>

                        {expandedCriteria[crit.id] && (
                          <div className="mt-2 space-y-1 text-[11px] bg-slate-900/60 p-2.5 rounded-lg border border-slate-800">
                            {Object.entries(crit.scoring_levels).map(([scoreKey, desc]) => (
                              <div key={scoreKey} className="flex gap-2">
                                <span className="font-mono font-bold text-indigo-300 w-8">{scoreKey}:</span>
                                <span className="text-slate-300">{desc}</span>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="p-6 rounded-2xl bg-slate-900/80 border border-slate-800 space-y-6">
                <div className="flex items-center gap-3 pb-3 border-b border-slate-800">
                  <i data-lucide="shield-check" className="w-5 h-5 text-emerald-400"></i>
                  <h2 className="text-base font-semibold text-slate-100">Live Grading Sandbox (Frozen Qwen-1.7B Judge)</h2>
                </div>

                <div className="space-y-2">
                  <label className="text-xs text-slate-300 font-medium">Response to Evaluate</label>
                  <textarea
                    value={responseToEvaluate}
                    onChange={(e) => setResponseToEvaluate(e.target.value)}
                    rows={4}
                    className="w-full p-3 text-xs rounded-xl bg-slate-950 border border-slate-800 text-slate-200 focus:outline-none focus:border-emerald-500 font-mono"
                  />
                  <button
                    onClick={() => {
                      setIsJudging(true);
                      setTimeout(() => setIsJudging(false), 500);
                    }}
                    className="w-full py-2.5 px-4 text-xs font-semibold rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg shadow-emerald-600/30 flex items-center justify-center gap-2 transition-all"
                  >
                    {isJudging ? <i data-lucide="refresh-cw" className="w-4 h-4 animate-spin"></i> : <i data-lucide="play" className="w-4 h-4"></i>}
                    Run Frozen Local Judge (Deterministic Greedy Score)
                  </button>
                </div>

                <div className="space-y-4 pt-2">
                  <div className="text-xs font-semibold text-slate-300">Criterion Satisfaction & Weighted Score</div>

                  {criteriaList.map((crit) => {
                    const satisfaction = satisfactionScores[crit.id] || 0.0;
                    const weightedVal = (crit.weight * satisfaction).toFixed(3);

                    return (
                      <div key={crit.id} className="p-3.5 rounded-xl bg-slate-950 border border-slate-800 space-y-2">
                        <div className="flex justify-between items-center text-xs">
                          <span className="text-slate-300 font-medium">Criterion #{crit.id} Satisfaction:</span>
                          <span className="font-mono text-emerald-400 font-bold">{satisfaction.toFixed(1)} / 1.0</span>
                        </div>

                        <input
                          type="range"
                          min="0.0"
                          max="1.0"
                          step="0.1"
                          value={satisfaction}
                          onChange={(e) => setSatisfactionScores(prev => ({ ...prev, [crit.id]: parseFloat(e.target.value) }))}
                          className="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-500"
                        />

                        <div className="flex justify-between items-center text-[11px] text-slate-400 pt-1 border-t border-slate-900">
                          <span>Weight ({crit.weight.toFixed(2)}) × Satisfaction ({satisfaction.toFixed(1)})</span>
                          <span className="font-mono text-indigo-300 font-bold">= {weightedVal}</span>
                        </div>
                      </div>
                    );
                  })}

                  <div className="p-4 rounded-xl bg-gradient-to-br from-slate-900 to-indigo-950 border border-indigo-800/50 flex items-center justify-between">
                    <div>
                      <div className="text-xs text-slate-400">Total Aggregated Rubric Score</div>
                      <div className="text-xl font-bold text-emerald-300 font-mono">
                        s = J(q, r, a) = {totalJudgeScore.toFixed(3)} / 1.000
                      </div>
                    </div>
                    <i data-lucide="award" className="w-8 h-8 text-emerald-400 opacity-80"></i>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* CORE VIEW 3: Preference Pair Consolidation Hub */}
          {activeTab === 'hub' && (
            <div className="space-y-6">
              <div className="flex items-center justify-between p-4 rounded-2xl bg-slate-900/80 border border-slate-800">
                <div className="flex items-center gap-3">
                  <i data-lucide="database" className="w-5 h-5 text-indigo-400"></i>
                  <div>
                    <h2 className="text-base font-semibold text-slate-100">On-Policy Rollout Preference Hub</h2>
                    <p className="text-xs text-slate-400">Constructs preference pairs (a+, a-) entirely on-policy without human annotation.</p>
                  </div>
                </div>

                <div className="px-3 py-1.5 rounded-full bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 text-xs font-semibold flex items-center gap-1.5">
                  <i data-lucide="check" className="w-3.5 h-3.5"></i>
                  Active Sampling Guard: Active (Filtering zero-variance prompt groups)
                </div>
              </div>

              <div className="p-6 rounded-2xl bg-slate-900/80 border border-slate-800 space-y-6">
                <div className="flex gap-2 border-b border-slate-800 pb-3">
                  <button
                    onClick={() => setHubTab('temporal')}
                    className={`px-4 py-2 text-xs font-semibold rounded-lg border transition-all ${
                      hubTab === 'temporal'
                        ? 'bg-indigo-600 text-white border-indigo-500'
                        : 'bg-slate-950 text-slate-400 border-slate-800 hover:text-slate-200'
                    }`}
                  >
                    1. Temporal Contrast (Default)
                  </button>
                  <button
                    onClick={() => setHubTab('inferred')}
                    className={`px-4 py-2 text-xs font-semibold rounded-lg border transition-all ${
                      hubTab === 'inferred'
                        ? 'bg-indigo-600 text-white border-indigo-500'
                        : 'bg-slate-950 text-slate-400 border-slate-800 hover:text-slate-200'
                    }`}
                  >
                    2. Inferred Question (IQ)
                  </button>
                  <button
                    onClick={() => setHubTab('rubric')}
                    className={`px-4 py-2 text-xs font-semibold rounded-lg border transition-all ${
                      hubTab === 'rubric'
                        ? 'bg-indigo-600 text-white border-indigo-500'
                        : 'bg-slate-950 text-slate-400 border-slate-800 hover:text-slate-200'
                    }`}
                  >
                    3. Rubric-Conditioned (RC)
                  </button>
                </div>

                {hubTab === 'temporal' && (
                  <div className="space-y-4">
                    <div className="text-xs text-slate-300">
                      <span className="font-semibold text-indigo-300">Temporal Contrast:</span> Pairs current response (a+) at step <span className="font-bold">t=120</span> against an older checkpoint's response (a-) at step <span className="font-bold">t'=40</span> (Age Gap = 80 steps, inside [20, 100]).
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div className="p-4 rounded-xl bg-emerald-950/30 border border-emerald-500/40 space-y-2">
                        <div className="flex justify-between items-center text-xs text-emerald-300 font-bold">
                          <span>Preferred (a+) • Step 120</span>
                          <span className="px-2 py-0.5 rounded bg-emerald-500/20 border border-emerald-500/40 text-[10px]">Current Policy</span>
                        </div>
                        <p className="text-xs text-slate-200 font-mono">
                          "The maximum area is 144, derived by solving L=W=12 for perimeter 48."
                        </p>
                      </div>

                      <div className="p-4 rounded-xl bg-rose-950/30 border border-rose-500/40 space-y-2">
                        <div className="flex justify-between items-center text-xs text-rose-300 font-bold">
                          <span>Dispreferred (a-) • Step 40</span>
                          <span className="px-2 py-0.5 rounded bg-rose-500/20 border border-rose-500/40 text-[10px]">Historical Checkpoint</span>
                        </div>
                        <p className="text-xs text-slate-200 font-mono">
                          "Area is 48 * 2 = 96."
                        </p>
                      </div>
                    </div>
                  </div>
                )}

                {hubTab === 'inferred' && (
                  <div className="p-4 rounded-xl bg-slate-950 border border-slate-800 space-y-3 text-xs">
                    <div className="font-semibold text-indigo-300">Inferred Question Strategy Pipeline:</div>
                    <div className="p-3 rounded-lg bg-slate-900 border border-slate-800 space-y-1 font-mono">
                      <div>1. Policy receives preferred response (a+)</div>
                      <div>2. Policy infers question: q_hat = "What is the maximum area of a rectangle?"</div>
                      <div>3. Policy generates dispreferred response (a-) based on q_hat</div>
                    </div>
                  </div>
                )}

                {hubTab === 'rubric' && (
                  <div className="p-4 rounded-xl bg-slate-950 border border-slate-800 space-y-3 text-xs">
                    <div className="font-semibold text-indigo-300">Rubric-Conditioned Strategy Pipeline:</div>
                    <div className="p-3 rounded-lg bg-slate-900 border border-slate-800 space-y-1 font-mono">
                      <div>1. Preferred (a+) generated with rubric prepended to prompt</div>
                      <div>2. Dispreferred (a-) generated on bare question without rubric</div>
                    </div>
                  </div>
                )}

                <div className="pt-4 border-t border-slate-800">
                  <div className="text-xs font-semibold text-slate-300 mb-3">Historical Rollout Buffer (2,048 Capacity)</div>
                  <div className="overflow-x-auto rounded-xl border border-slate-800">
                    <table className="w-full text-left text-xs text-slate-300">
                      <thead className="bg-slate-950 text-slate-400 font-medium">
                        <tr>
                          <th className="p-3">Step ID</th>
                          <th className="p-3">Question</th>
                          <th className="p-3">Response Snippet</th>
                          <th className="p-3">Age Gap</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-800/60 bg-slate-900/40">
                        {rolloutBuffer.map((row, idx) => (
                          <tr key={idx} className="hover:bg-slate-800/40">
                            <td className="p-3 font-mono text-indigo-300">{row.step}</td>
                            <td className="p-3">{row.question}</td>
                            <td className="p-3 font-mono text-slate-400">{row.response}</td>
                            <td className="p-3">{row.ageGap} steps</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* CORE VIEW 4: Real-Time GRPO Telemetry Dashboard */}
          {activeTab === 'telemetry' && (
            <div className="space-y-6">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div className="p-5 rounded-2xl bg-slate-900/80 border border-slate-800 flex items-center justify-between">
                  <div>
                    <div className="text-xs text-slate-400">Average Score Margin (m_bar)</div>
                    <div className="text-2xl font-bold text-emerald-400 font-mono mt-1">+0.42</div>
                    <div className="text-[11px] text-slate-500 mt-1">Discriminative utility gap J(a+) - J(a-)</div>
                  </div>
                  <i data-lucide="trending-up" className="w-8 h-8 text-emerald-400/80"></i>
                </div>

                <div className="p-5 rounded-2xl bg-slate-900/80 border border-slate-800 flex items-center justify-between">
                  <div>
                    <div className="text-xs text-slate-400">Schema Format Compliance %</div>
                    <div className="text-2xl font-bold text-indigo-400 font-mono mt-1">99.2%</div>
                    <div className="text-[11px] text-slate-500 mt-1">Locked via 0.3 format reward weight</div>
                  </div>
                  <i data-lucide="shield-check" className="w-8 h-8 text-indigo-400/80"></i>
                </div>

                <div className="p-5 rounded-2xl bg-slate-900/80 border border-slate-800 flex items-center justify-between">
                  <div>
                    <div className="text-xs text-slate-400">Fleiss's Kappa Agreement (κ_hat)</div>
                    <div className="text-2xl font-bold text-amber-400 font-mono mt-1">0.64</div>
                    <div className="text-[11px] text-slate-500 mt-1">Strong ensemble calibration score</div>
                  </div>
                  <i data-lucide="award" className="w-8 h-8 text-amber-400/80"></i>
                </div>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="p-5 rounded-2xl bg-slate-900/80 border border-slate-800 space-y-4">
                  <div className="text-xs font-semibold text-slate-300">Average Score Margin Widening</div>
                  {renderSvgLine(marginCurve, 0.0, 0.5, '#10b981')}
                  <div className="flex justify-between text-[10px] text-slate-500">
                    <span>Epoch 1 (+0.05)</span>
                    <span>Epoch 7 (+0.42)</span>
                  </div>
                </div>

                <div className="p-5 rounded-2xl bg-slate-900/80 border border-slate-800 space-y-4">
                  <div className="text-xs font-semibold text-slate-300">OLMo3-Adapt Downstream Accuracy (%)</div>
                  {renderSvgLine(accuracyCurve, 55.0, 75.0, '#6366f1')}
                  <div className="flex justify-between text-[10px] text-slate-500">
                    <span>Base (59.7%)</span>
                    <span>EvoLM (69.3%)</span>
                  </div>
                </div>

                <div className="p-5 rounded-2xl bg-slate-900/80 border border-slate-800 space-y-4">
                  <div className="text-xs font-semibold text-slate-300">Schema Validation Error Rate (%)</div>
                  {renderSvgLine(formatErrorCurve, 0.0, 80.0, '#f43f5e')}
                  <div className="flex justify-between text-[10px] text-slate-500">
                    <span>Unformatted (77%)</span>
                    <span>With R_format (0.8%)</span>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 100);
  </script>
</body>
</html>
